<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1stStep Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0f14;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ─── Auth Gate ─── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    #auth-gate h2 { font-size: 1.1rem; color: #94a3b8; font-weight: 500; }
    #auth-gate input {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #2d3748;
      background: #1a1f2e;
      color: #e2e8f0;
      font-size: 1rem;
      width: 280px;
      outline: none;
    }
    #auth-gate input:focus { border-color: #6366f1; }
    #auth-gate button {
      padding: 10px 28px;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      width: 280px;
    }
    #auth-gate button:hover { background: #4f46e5; }
    #auth-error { color: #f87171; font-size: 0.85rem; display: none; }

    /* ─── Dashboard ─── */
    #dashboard { display: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid #1e2538;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; }
    header h1 span { color: #6366f1; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #refresh-info { font-size: 0.8rem; color: #64748b; }
    #refresh-btn {
      padding: 6px 14px;
      border-radius: 6px;
      background: #1e2538;
      color: #94a3b8;
      border: 1px solid #2d3748;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #refresh-btn:hover { background: #2d3748; color: #e2e8f0; }

    main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

    /* ─── Metric Cards ─── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }
    .card {
      background: #141825;
      border: 1px solid #1e2538;
      border-radius: 12px;
      padding: 20px 22px;
    }
    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 10px;
    }
    .card-value {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      color: #f1f5f9;
    }
    .card-value.loading { color: #334155; }
    .card-sub {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 6px;
    }
    .card.accent-blue  { border-color: #1e40af22; }
    .card.accent-indigo { border-color: #6366f133; }
    .card.accent-violet { border-color: #7c3aed33; }
    .card.accent-green  { border-color: #16a34a33; }
    .card.accent-blue  .card-value  { color: #60a5fa; }
    .card.accent-indigo .card-value { color: #818cf8; }
    .card.accent-violet .card-value { color: #a78bfa; }
    .card.accent-green  .card-value { color: #4ade80; }

    /* ─── Recent Signups ─── */
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 14px;
    }
    .table-wrap {
      background: #141825;
      border: 1px solid #1e2538;
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 18px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #475569;
      background: #0f1320;
      border-bottom: 1px solid #1e2538;
    }
    tbody tr { border-bottom: 1px solid #1a1f2e; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 13px 18px; font-size: 0.875rem; color: #cbd5e1; }
    td.name { font-weight: 500; color: #f1f5f9; }
    td.email { color: #94a3b8; font-size: 0.82rem; }
    td.date  { color: #64748b; font-size: 0.8rem; white-space: nowrap; }

    /* ─── Tag Badges ─── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-paid    { background: #14532d33; color: #4ade80; border: 1px solid #16a34a44; }
    .badge-power   { background: #4c1d9533; color: #c4b5fd; border: 1px solid #7c3aed44; }
    .badge-active  { background: #1e3a5f33; color: #60a5fa; border: 1px solid #1d4ed844; }
    .badge-beta    { background: #7c2d1233; color: #fb923c; border: 1px solid #c2410c44; }
    .badge-free    { background: #1e293b;   color: #64748b; border: 1px solid #334155; }

    /* ─── Error state ─── */
    #error-bar {
      display: none;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    #empty-row td { color: #475569; font-style: italic; text-align: center; padding: 28px; }
  </style>
</head>
<body>

<!-- Auth Gate -->
<div id="auth-gate">
  <h2>1stStep Admin</h2>
  <input type="password" id="secret-input" placeholder="Admin password" autocomplete="current-password" />
  <div id="auth-error">Incorrect password. Try again.</div>
  <button onclick="tryLogin()">Sign in</button>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <h1>1stStep <span>Admin</span></h1>
    <div class="header-right">
      <span id="refresh-info">Refreshing in <strong id="countdown">30</strong>s</span>
      <button id="refresh-btn" onclick="loadStats()">↻ Refresh now</button>
    </div>
  </header>

  <main>
    <div id="error-bar"></div>

    <div class="metrics">
      <div class="card">
        <div class="card-label">Total Signups</div>
        <div class="card-value loading" id="m-total">—</div>
        <div class="card-sub">All contacts</div>
      </div>
      <div class="card accent-blue">
        <div class="card-label">Beta Users</div>
        <div class="card-value loading" id="m-beta">—</div>
        <div class="card-sub">Active beta access</div>
      </div>
      <div class="card accent-indigo">
        <div class="card-label">Active Users</div>
        <div class="card-value loading" id="m-active">—</div>
        <div class="card-sub">1+ resume tailored</div>
      </div>
      <div class="card accent-violet">
        <div class="card-label">Power Users</div>
        <div class="card-value loading" id="m-power">—</div>
        <div class="card-sub">5+ tailors</div>
      </div>
      <div class="card accent-green">
        <div class="card-label">Paid</div>
        <div class="card-value loading" id="m-paid">—</div>
        <div class="card-sub">Active subscribers</div>
      </div>
    </div>

    <div class="section-title">Recent Signups</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="recent-tbody">
          <tr id="empty-row"><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <p style="font-size:0.72rem;color:#334155;margin-top:14px;text-align:right;" id="updated-at"></p>
  </main>
</div>

<script>
  const SESSION_KEY = '1ststep_admin_secret';
  let countdownVal = 30;
  let countdownTimer = null;
  let secret = '';

  // ── Auth ──────────────────────────────────────────────────────────────
  function tryLogin() {
    const input = document.getElementById('secret-input').value.trim();
    if (!input) return;
    secret = input;
    loadStats(true);
  }

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  // ── Fetch stats ──────────────────────────────────────────────────────
  async function loadStats(isLogin = false) {
    try {
      const res = await fetch(`/api/health?mode=admin&secret=${encodeURIComponent(secret)}`);

      if (res.status === 401) {
        if (isLogin) {
          document.getElementById('auth-error').style.display = 'block';
          secret = '';
        }
        return;
      }

      // First successful load — show dashboard
      if (isLogin || document.getElementById('auth-gate').style.display !== 'none') {
        sessionStorage.setItem(SESSION_KEY, secret);
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        startCountdown();
      }

      const data = await res.json();
      renderStats(data);
      hideError();

    } catch (err) {
      showError('Could not reach /api/admin-stats. Check that it is deployed.');
    }
  }

  function renderStats({ funnel, recent, updatedAt }) {
    const fmt = v => v === null || v === undefined ? '?' : v.toLocaleString();
    document.getElementById('m-total').textContent  = fmt(funnel.total);
    document.getElementById('m-beta').textContent   = fmt(funnel.beta);
    document.getElementById('m-active').textContent = fmt(funnel.activeUsers);
    document.getElementById('m-power').textContent  = fmt(funnel.powerUsers);
    document.getElementById('m-paid').textContent   = fmt(funnel.paid);

    // Remove loading style once values arrive
    ['m-total','m-beta','m-active','m-power','m-paid'].forEach(id => {
      document.getElementById(id).classList.remove('loading');
    });

    renderRecent(recent);

    if (updatedAt) {
      const d = new Date(updatedAt);
      document.getElementById('updated-at').textContent =
        `Last updated ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    }
  }

  function renderRecent(contacts) {
    const tbody = document.getElementById('recent-tbody');
    if (!contacts || contacts.length === 0) {
      tbody.innerHTML = '<tr id="empty-row"><td colspan="4">No signups yet.</td></tr>';
      return;
    }
    tbody.innerHTML = contacts.map(c => `
      <tr>
        <td class="name">${esc(c.name)}</td>
        <td class="email">${esc(c.email)}</td>
        <td>${topBadge(c.tags)}</td>
        <td class="date">${fmtDate(c.dateAdded)}</td>
      </tr>
    `).join('');
  }

  function topBadge(tags = []) {
    const t = tags.map(x => x.toLowerCase());
    if (t.includes('converted_complete') || t.includes('converted_essential'))
      return '<span class="badge badge-paid">Paid</span>';
    if (t.includes('power_user'))
      return '<span class="badge badge-power">Power User</span>';
    if (t.includes('active_user'))
      return '<span class="badge badge-active">Active</span>';
    if (t.includes('beta'))
      return '<span class="badge badge-beta">Beta</span>';
    return '<span class="badge badge-free">Free</span>';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Auto-refresh countdown ───────────────────────────────────────────
  function startCountdown() {
    countdownVal = 30;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdownVal--;
      const el = document.getElementById('countdown');
      if (el) el.textContent = countdownVal;
      if (countdownVal <= 0) {
        loadStats();
        countdownVal = 30;
      }
    }, 1000);
  }

  // ── Error bar ────────────────────────────────────────────────────────
  function showError(msg) {
    const bar = document.getElementById('error-bar');
    bar.textContent = msg;
    bar.style.display = 'block';
  }
  function hideError() {
    document.getElementById('error-bar').style.display = 'none';
  }

  // ── Resume session ───────────────────────────────────────────────────
  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved) {
    secret = saved;
    loadStats(true);
  }
</script>
</body>
</html>
