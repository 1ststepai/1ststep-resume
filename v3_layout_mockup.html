<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1stStep.ai V3 Layout Mockup</title>
  <style>
    :root {
      --bg: #0a0b14;
      --surface: #121421;
      --surface2: #1e2133;
      --border: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --indigo: #6366f1;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; 
      height: 100vh; width: 100vw; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 40px;
      flex-shrink: 0;
      z-index: 100;
    }

    .logo { font-weight: 800; font-size: 18px; color: var(--indigo); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }

    .mode-toggle {
      display: flex;
      gap: 12px;
      margin: 0 auto;
    }

    .mode-btn {
      background: none; border: none;
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .mode-btn.active { color: var(--text); background: rgba(99,102,241,0.1); }

    /* LAYOUT BODY */
    .layout-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* SIDEBAR */
    #appSidebar {
      width: 220px;
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .sb-item.active { color: var(--indigo); background: rgba(99,102,241,0.06); }

    /* MAIN AREA */
    .main {
      flex: 1;
      display: flex;
      flex-direction: row; /* Horizontal split for resume */
      overflow: hidden;
      position: relative;
    }

    /* RESUME MULTI-COLUMN */
    .left-panel {
      width: 520px;
      height: 100%;
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
    }

    .right-panel {
      flex: 1;
      height: 100%;
      padding: 24px;
      overflow-y: auto;
    }

    /* TOOL PANEL (SINGLE COLUMN) */
    .tool-panel {
      display: none; /* Hidden unless active */
      width: 100%;
      height: 100%;
      background: var(--bg);
      padding: 0;
      overflow-y: auto;
    }

    /* THE FIX: When a tool is active, it fills the whole main row */
    .main.mode-tool .left-panel, 
    .main.mode-tool .right-panel { display: none; }
    .main.mode-tool .tool-panel { display: flex; flex-direction: column; }

    .centered-content {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .mock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      background: var(--indigo);
      color: white;
      margin-bottom: 8px;
    }

    /* HELPERS */
    .h2 { font-size: 20px; font-weight: 700; margin: 0 0 12px; }
    .p { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 0; }

    /* Interactive Simulation */
    #mode-indicator {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 100px; font-size: 12px;
    }
  </style>
</head>
<body class="">

  <div class="app">
    <div class="topbar">
      <div class="logo">1stStep<span>.ai</span></div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('resume')">Resume Tailor</button>
        <button class="mode-btn" onclick="setMode('jobs')">Job Search</button>
        <button class="mode-btn" onclick="setMode('aicoach')">AI Coach</button>
      </div>
    </div>

    <div class="layout-body">
      <nav id="appSidebar">
        <button class="sb-item active" onclick="setMode('resume')">Resume Tailor</button>
        <button class="sb-item" onclick="setMode('jobs')">Job Search</button>
        <button class="sb-item" onclick="setMode('aicoach')">AI Coach</button>
        <button class="sb-item" onclick="setMode('audit')">Profile Audit</button>
      </nav>

      <main class="main" id="mainWrapper">
        <!-- RESUME MODE PANELS -->
        <div class="left-panel">
          <div class="pill">INPUT</div>
          <h2 class="h2">Paste your resume</h2>
          <div class="mock-card" style="height: 400px; background: rgba(255,255,255,0.02); border-style: dashed;">
            <p class="p">Resume content goes here...</p>
          </div>
        </div>
        <div class="right-panel">
          <div class="pill">RESULTS</div>
          <h2 class="h2">Tailored Output</h2>
          <div class="mock-card" style="height: 600px;">
            <p class="p">This scrolls independently of the left side.</p>
          </div>
        </div>

        <!-- TOOL MODE PANEL -->
        <div class="tool-panel">
          <div class="centered-content">
            <div class="pill" id="toolPill">TOOL</div>
            <h1 class="h2" id="toolTitle">AI Coach</h1>
            <p class="p" style="margin-bottom: 30px;">This is a full-width, centered experience optimized for tools.</p>
            
            <div class="mock-card">
              <h3 class="h2" style="font-size: 16px;">Chat History</h3>
              <div style="height: 300px; background: rgba(0,0,0,0.2); border-radius: 8px;"></div>
            </div>

            <div class="mock-card">
              <input type="text" placeholder="Ask anything..." style="width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white;">
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="mode-indicator">Current Mode: <b>Resume Tailor</b></div>

  <script>
    function setMode(mode) {
      const wrapper = document.getElementById('mainWrapper');
      const indicator = document.getElementById('mode-indicator');
      const title = document.getElementById('toolTitle');
      const pill = document.getElementById('toolPill');

      // Reset
      document.querySelectorAll('.sb-item, .mode-btn').forEach(el => el.classList.remove('active'));
      
      if (mode === 'resume') {
        wrapper.classList.remove('mode-tool');
        indicator.innerHTML = 'Current Mode: <b>Resume Tailor</b>';
      } else {
        wrapper.classList.add('mode-tool');
        indicator.innerHTML = `Current Mode: <b>${mode.toUpperCase()}</b>`;
        title.innerText = mode === 'aicoach' ? 'AI Coach' : 'Profile Audit';
        pill.innerText = mode.toUpperCase();
      }

      // Sidebar highlight logic
      document.querySelectorAll('.sb-item').forEach(el => {
        if(el.innerText.toLowerCase().includes(mode.substring(0,4))) el.classList.add('active');
      });
      document.querySelectorAll('.mode-btn').forEach(el => {
        if(el.innerText.toLowerCase().includes(mode.substring(0,4))) el.classList.add('active');
      });
    }
  </script>
</body>
</html>
