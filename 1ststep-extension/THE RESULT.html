<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 2 — Instant Tailored Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1e1e1e;
  height:100vh;
  font-family:'Inter',sans-serif;
}
.screenshot {
  width:1280px;
  height:800px;
  background:#F8FAFC;
  display:flex;
  flex-direction:column;
}
.header {
  text-align:center;
  padding:60px 40px 30px;
}
.header h1 {
  font-size:56px;
  font-weight:800;
}
.header p {
  font-size:20px;
  color:#64748B;
}
.content {
  display:flex;
  gap:30px;
  padding:40px 80px;
}
.card {
  flex:1;
  background:white;
  border-radius:12px;
  border:1px solid #E2E8F0;
  padding:20px;
}
.line {
  height:6px;
  background:#E2E8F0;
  margin-bottom:8px;
  border-radius:4px;
}
.result {
  border-color:#A5B4FC;
  background:#EEF2FF;
}
.score {
  font-size:40px;
  font-weight:800;
  color:#4338CA;
}
</style>
</head>
<body>
<div class="screenshot">
  <div class="header">
    <h1>Get a tailored resume in seconds</h1>
    <p>AI matches your resume to the job automatically</p>
  </div>
  <div class="content">
    <div class="card">
      <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>
    <div class="card result">
      <div class="score">92% Match</div>
      <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>
  </div>
</div>
</body>
</html>
