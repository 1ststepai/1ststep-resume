<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 1 — Tailor From Any Job Post</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1e1e1e;
  height:100vh;
  font-family:'Inter',sans-serif;
}
.screenshot {
  width:1280px;
  height:800px;
  background:#F8FAFC;
  display:flex;
  flex-direction:column;
}
.header {
  text-align:center;
  padding:60px 40px 30px;
}
.header h1 {
  font-size:56px;
  font-weight:800;
  margin:0;
}
.header p {
  color:#64748B;
  font-size:20px;
}
.job {
  margin:40px auto;
  width:900px;
  height:400px;
  background:white;
  border-radius:12px;
  border:1px solid #E2E8F0;
  position:relative;
  padding:20px;
}
.job h2 {
  font-size:22px;
  margin-bottom:8px;
}
.job p {
  height:6px;
  background:#E2E8F0;
  margin-bottom:8px;
  border-radius:4px;
}
.button {
  position:absolute;
  right:20px;
  bottom:20px;
  background:#4338CA;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 10px 25px rgba(67,56,202,0.3);
}
.arrow {
  position:absolute;
  right:140px;
  bottom:90px;
  font-size:40px;
  color:#4338CA;
}
</style>
</head>
<body>
<div class="screenshot">
  <div class="header">
    <h1>Tailor your resume from any job post</h1>
    <p>No more copy & paste</p>
  </div>
  <div class="job">
    <h2>Senior Product Designer</h2>
    <p></p><p></p><p></p><p></p><p></p>
    <div class="button">Tailor Resume</div>
    <div class="arrow">→</div>
  </div>
</div>
</body>
</html>
